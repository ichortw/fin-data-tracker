<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AssetTracker 行動資產看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body { font-family: 'Microsoft JhengHei', -apple-system, BlinkMacSystemFont, sans-serif; }
        /* 隱藏滾動條但保持功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col pb-safe">

    <header class="bg-slate-900/80 backdrop-blur-md border-b border-slate-800 sticky top-0 z-40 px-4 py-3">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-teal-400 bg-clip-text text-transparent">AssetTracker</h1>
                <p class="text-xs text-slate-400 mt-0.5">行動資產管理系統 (V5 Edge)</p>
            </div>
            <div class="flex space-x-2">
                <button onclick="openAddModal()" class="p-2 bg-blue-600 hover:bg-blue-500 rounded-xl shadow-md transition-colors" title="新增資產">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                </button>
                <button onclick="exportAndShareCSV()" class="p-2 bg-cyan-600 hover:bg-cyan-500 rounded-xl shadow-md transition-colors" title="打包導出分享">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-md w-full mx-auto px-4 py-6 overflow-y-auto no-scrollbar">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 mb-6 shadow-lg">
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">⚡ 您的專屬 CLOUDFLARE WORKER 網址：</label>
            <input type="text" id="workerUrlInput" onchange="saveWorkerUrl()" placeholder="https://fin-data-api.chortw.workers.dev" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-slate-100 font-mono text-sm focus:outline-none focus:border-blue-500 transition-colors">
            <p class="text-[11px] text-slate-500 mt-1.5">填入您的 Cloudflare 網址，系統會自動將其鎖定在本地瀏覽器中。</p>
        </div>

        <div class="mb-6">
            <button id="updateBtn" onclick="updateAllOnlinePrices()" class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg transition-all transform active:scale-[0.99] flex items-center justify-center space-x-2">
                <span id="btnIcon">🔄</span>
                <span id="btnText">線上更新報價</span>
            </button>
        </div>

        <div id="assetContainer">
            </div>
    </main>

    <div id="addModal" class="hidden fixed inset-0 bg-slate-950/85 backdrop-blur-sm z-50 items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl w-full max-w-sm p-6 shadow-2xl animate-in fade-in zoom-in duration-200">
            <div class="flex items-center space-x-2 mb-6">
                <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                <h3 class="text-lg font-bold text-slate-100">新增資產配置</h3>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">ISIN 識別碼 (標準 12 碼)</label>
                    <input type="text" id="modalIsin" placeholder="例如: IE0004WJOWO1" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-slate-100 font-mono focus:outline-none focus:border-blue-500 transition-colors">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">資產類別</label>
                    <select id="modalType" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-slate-100 focus:outline-none focus:border-blue-500 transition-colors">
                        <option value="mutualfund">MutualFund (共同基金)</option>
                        <option value="bond">Bond (公債)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">自訂資產名稱</label>
                    <input type="text" id="modalName" placeholder="例如: PIMCO收益基金港元派息" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-slate-100 focus:outline-none focus:border-blue-500 transition-colors">
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-3 mt-8">
                <button onclick="closeAddModal()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 font-medium py-3 rounded-xl transition-colors">取消</button>
                <button onclick="saveNewAsset()" class="bg-blue-600 hover:bg-blue-500 text-white font-medium py-3 rounded-xl transition-colors">確認儲存</button>
            </div>
        </div>
    </div>

    <script>
        // 初始內建基本資產
        const defaultAssets = [
            { isin: 'GB00BPCJD997', type: 'bond', name: '英國公債 2053' },
            { isin: 'US912810UB25', type: 'bond', name: '美元國債 2044' },
            { isin: 'US912810TW80', type: 'bond', name: '美元國債 2043' },
            { isin: 'IE00B92ZW543', type: 'mutualfund', name: 'PIMCO收益基金港元派息' },
            { isin: 'HK0000084522', type: 'mutualfund', name: 'JPM全方位入息基金港元派息' },
            { isin: 'LU1929549753', type: 'mutualfund', name: 'FTI入息基金港元派息' }
        ];

        // 從 localStorage 讀取或初始化資產清單
        let assets = JSON.parse(localStorage.getItem('asset_list')) || defaultAssets;
        if (!localStorage.getItem('asset_list')) {
            localStorage.setItem('asset_list', JSON.stringify(assets));
        }

        // 頁面初始化載入
        window.onload = function() {
            loadWorkerUrl();
            renderAssets();
        };

        // 核心功能：動態渲染資產卡片列表
        function renderAssets() {
            const container = document.getElementById('assetContainer');
            container.innerHTML = '';
            
            if (assets.length === 0) {
                container.innerHTML = `<div class="text-center text-slate-500 py-12 text-sm">目前無任何資產，請點擊右上方「+」按鈕新增。</div>`;
                return;
            }

            assets.forEach((asset, index) => {
                const card = document.createElement('div');
                card.className = "bg-slate-900 border border-slate-800 rounded-2xl p-4 mb-4 flex flex-col justify-between shadow-lg relative";
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="pr-2">
                            <h3 class="text-base font-bold text-slate-100">${asset.name}</h3>
                            <p class="text-xs text-slate-400 mt-0.5 font-mono select-all">${asset.isin}</p>
                        </div>
                        <div class="flex items-center space-x-1.5 flex-shrink-0">
                            <span class="text-[9px] px-1.5 py-0.5 rounded bg-slate-950 border border-slate-800 text-slate-400 font-medium uppercase">
                                ${asset.type === 'bond' ? 'Bond' : 'Fund'}
                            </span>
                            <div class="flex items-center bg-slate-950/80 border border-slate-800 rounded-xl p-0.5 space-x-0.5 shadow-inner">
                                <button onclick="moveAsset(${index}, -1)" class="p-1 hover:text-blue-400 text-slate-500 transition-colors" title="上移">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 15l7-7 7 7"/></svg>
                                </button>
                                <button onclick="moveAsset(${index}, 1)" class="p-1 hover:text-blue-400 text-slate-500 transition-colors" title="下移">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/></svg>
                                </button>
                                <button onclick="deleteAsset(${index})" class="p-1 hover:text-red-400 text-slate-500 transition-colors" title="刪除">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="flex justify-between items-end mt-5">
                        <div class="text-[11px] text-slate-500 leading-tight">
                            更新時間<br><span id="time-${asset.isin}" class="text-slate-400 font-mono">尚未更新</span>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] text-slate-500 block">最新報價</span>
                            <span id="price-${asset.isin}" class="text-xl font-bold font-mono text-emerald-400">---</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 功能 1：修復新增資產配置
        function openAddModal() {
            document.getElementById('addModal').classList.remove('hidden');
            document.getElementById('addModal').classList.add('flex');
        }
        function closeAddModal() {
            document.getElementById('addModal').classList.add('hidden');
            document.getElementById('addModal').classList.remove('flex');
            document.getElementById('modalIsin').value = '';
            document.getElementById('modalName').value = '';
        }
        function saveNewAsset() {
            const isin = document.getElementById('modalIsin').value.trim();
            const type = document.getElementById('modalType').value;
            const name = document.getElementById('modalName').value.trim();

            if (!isin || !name) {
                alert('請完整填寫 ISIN 識別碼與自訂資產名稱！');
                return;
            }

            assets.push({ isin, type, name });
            localStorage.setItem('asset_list', JSON.stringify(assets));
            renderAssets();
            closeAddModal();
        }

        // 功能 2：無痕刪除資產紀錄
        function deleteAsset(index) {
            if (confirm(`確定要刪除「${assets[index].name}」的管理配置嗎？`)) {
                assets.splice(index, 1);
                localStorage.setItem('asset_list', JSON.stringify(assets));
                renderAssets();
            }
        }

        // 功能 3：上下編輯移動排序
        function moveAsset(index, direction) {
            const targetIndex = index + direction;
            if (targetIndex < 0 || targetIndex >= assets.length) return; // 越界直接攔截

            const temp = assets[index];
            assets[index] = assets[targetIndex];
            assets[targetIndex] = temp;

            localStorage.setItem('asset_list', JSON.stringify(assets));
            renderAssets();
        }

        // Worker 網址本端記憶儲存與讀取
        function saveWorkerUrl() {
            const url = document.getElementById('workerUrlInput').value.trim();
            localStorage.setItem('worker_url', url);
        }
        function loadWorkerUrl() {
            const url = localStorage.getItem('worker_url') || '';
            document.getElementById('workerUrlInput').value = url;
        }

        // 核心功能：並行抓取報價與優雅狀態提示（已移除舊版多餘彈窗）
        async function updateAllOnlinePrices() {
            let workerUrl = document.getElementById('workerUrlInput').value.trim();
            if (!workerUrl) {
                // 如果是空的，嘗試去抓 placeholder
                workerUrl = document.getElementById('workerUrlInput').placeholder;
            }

            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const originalText = btnText.innerText;
            
            btnText.innerText = "正在同步邊緣數據...";
            btnIcon.innerText = "⚡";

            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-TW', { hour12: true });

            // 構造清洗與並行 Fetch 請求
            const cleanBaseUrl = workerUrl.endsWith('/') ? workerUrl.slice(0, -1) : workerUrl;

            const promises = assets.map(async (asset) => {
                try {
                    const finalRequestUrl = `${cleanBaseUrl}?isin=${asset.isin}&type=${asset.type}`;
                    const response = await fetch(finalRequestUrl);
                    if (!response.ok) throw new Error();
                    
                    const data = await response.json();
                    if (data.status === 'success' && data.price !== undefined) {
                        document.getElementById(`price-${asset.isin}`).innerText = data.price.toFixed(4);
                        document.getElementById(`time-${asset.isin}`).innerText = timeStr;
                    } else {
                        document.getElementById(`price-${asset.isin}`).innerText = "解析失敗";
                    }
                } catch (err) {
                    document.getElementById(`price-${asset.isin}`).innerText = "網路異常";
                }
            });

            await Promise.all(promises);

            // ✨ 極簡流暢的動態文字提示，取代原本打斷體驗的彈窗詢問
            btnText.innerText = "✨ 更新成功！";
            btnIcon.innerText = "✅";
            setTimeout(() => {
                btnText.innerText = originalText;
                btnIcon.innerText = "🔄";
            }, 2000);
        }

        // 獨立功能：打包分享導出 CSV
        function exportAndShareCSV() {
            let csvContent = "資產名稱,ISIN識別碼,資產類別,最新報價,更新時間\n";
            assets.forEach(asset => {
                const price = document.getElementById(`price-${asset.isin}`)?.innerText || '---';
                const time = document.getElementById(`time-${asset.isin}`)?.innerText || '尚未更新';
                csvContent += `"${asset.name}","${asset.isin}","${asset.type}","${price}","${time}"\n`;
            });

            const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const dateString = new Date().toISOString().slice(0, 10);
            const fileName = `AssetReport_${dateString}.csv`;

            // 如果行動端設備支援原生分享協議
            if (navigator.canShare && navigator.canShare({ files: [new File([blob], fileName, {type: 'text/csv'})] })) {
                const file = new File([blob], fileName, { type: 'text/csv' });
                navigator.share({
                    files: [file],
                    title: 'AssetTracker 行動資產報表',
                    text: `數據打包導出時間: ${new Date().toLocaleString()}`
                }).catch(() => triggerDownload(blob, fileName));
            } else {
                triggerDownload(blob, fileName);
            }
        }

        function triggerDownload(blob, fileName) {
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", fileName);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
