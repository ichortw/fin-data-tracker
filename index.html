<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>金算盤</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body { font-family: 'Microsoft JhengHei', -apple-system, BlinkMacSystemFont, sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        /* 平板與桌機響應式網格 (CSS Grid) 僅保留給主檔頁籤使用 */
        .asset-container {
            display: grid;
            grid-template-columns: 1fr; 
            gap: 16px;
            width: 100%;
        }

        @media (min-width: 768px) {
            .asset-container {
                grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); 
                gap: 20px;
            }
        }

        .charts-vertical-stack {
            display: flex;
            flex-direction: column; 
            gap: 24px;
            width: 100%;
        }

        @media (min-width: 992px) { 
            .charts-vertical-stack {
                flex-direction: row; 
                gap: 20px;
            }
            .charts-vertical-stack > div {
                flex: 1;
                min-width: 0; 
            }
        }

        .backup-section {
            max-width: 500px; 
            margin: 30px auto 0 auto; 
            width: 100%;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col pb-safe overflow-x-hidden">

    <header class="bg-slate-900/80 backdrop-blur-md border-b border-slate-800 sticky top-0 z-40 px-4 py-3">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold bg-gradient-to-r from-amber-400 to-emerald-400 bg-clip-text text-transparent">金算盤 V8.3</h1>
                <p class="text-[10px] text-slate-400 mt-0.5 tracking-widest uppercase">Ultra-Lean Edge API</p>
            </div>
            <div class="flex space-x-2">
                <button onclick="exportPublicCSV()" class="p-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl transition-colors" title="分享公開報價">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>
                </button>
                <button onclick="exportPrivateCSV()" class="p-2 bg-red-900/80 hover:bg-red-800 text-red-200 rounded-xl transition-colors shadow-lg shadow-red-900/20" title="私密帳本本地導出">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                </button>
            </div>
        </div>
        
        <div class="max-w-5xl mx-auto mt-3 flex bg-slate-950 rounded-xl p-1 border border-slate-800">
            <button onclick="switchTab('overview')" id="tab-btn-overview" class="flex-1 py-1.5 text-xs font-bold rounded-lg bg-slate-800 text-emerald-400 shadow transition-all">📊 總覽與圖表</button>
            <button onclick="switchTab('holdings')" id="tab-btn-holdings" class="flex-1 py-1.5 text-xs font-bold rounded-lg text-slate-400 hover:text-slate-200 transition-all">💼 資產帳戶</button>
            <button onclick="switchTab('master')" id="tab-btn-master" class="flex-1 py-1.5 text-xs font-bold rounded-lg text-slate-400 hover:text-slate-200 transition-all">⚙️ 資產報價</button>
        </div>
    </header>

    <main class="flex-1 max-w-5xl w-full mx-auto px-4 py-4 overflow-y-auto no-scrollbar">

        <div id="tab-overview" class="space-y-6">
            <div class="bg-gradient-to-br from-slate-900 to-slate-800 border border-slate-700 rounded-2xl p-5 shadow-xl relative overflow-hidden">
                <div class="absolute -right-4 -top-4 w-24 h-24 bg-emerald-500/10 rounded-full blur-2xl"></div>
                <h2 class="text-xs text-slate-400 font-bold uppercase tracking-widest mb-1">總資產市值 (HKD)</h2>
                <div class="text-3xl md:text-5xl font-mono font-bold text-slate-100" id="grandTotalValue">$0.00</div>
                <div class="mt-3 flex justify-between items-end border-t border-slate-700/50 pt-3">
                    <div>
                        <p class="text-[10px] md:text-xs text-slate-400">總成本</p>
                        <p class="text-sm md:text-lg font-mono text-slate-300" id="grandTotalCost">$0.00</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] md:text-xs text-slate-400">總浮盈/虧</p>
                        <p class="text-base md:text-xl font-mono font-bold text-emerald-400" id="grandTotalPnL">+$0.00</p>
                    </div>
                </div>
                <div class="mt-4 bg-emerald-950/40 border border-emerald-800/50 rounded-lg p-3 flex justify-between items-center">
                    <span class="text-[10px] md:text-xs text-emerald-400 font-bold tracking-widest">💰 預估年配息被動收入 (HKD)</span>
                    <span class="text-base md:text-lg font-mono font-bold text-emerald-300" id="grandTotalIncome">$0.00</span>
                </div>
            </div>

            <div class="charts-vertical-stack">
                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 shadow-lg flex flex-col items-center">
                    <h3 class="text-xs text-slate-400 font-bold uppercase mb-3 w-full text-left border-l-2 border-emerald-500 pl-2">Bucket 佔比分佈</h3>
                    <div class="w-full relative aspect-square max-h-[260px] sm:max-h-[300px]">
                        <canvas id="bucketChart"></canvas>
                    </div>
                </div>
                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 shadow-lg flex flex-col items-center">
                    <h3 class="text-xs text-slate-400 font-bold uppercase mb-3 w-full text-left border-l-2 border-rose-500 pl-2">資產淨浮盈虧排行</h3>
                    <div class="w-full relative min-h-[220px] max-h-[260px] sm:max-h-[300px] flex-1">
                        <canvas id="pnlChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="space-y-3">
                <h3 class="text-xs text-slate-400 font-bold uppercase tracking-widest border-l-2 border-amber-500 pl-2">Bucket 維度統計</h3>
                <div id="bucketSummaryContainer" class="flex flex-col gap-4"></div>
            </div>
            
            <div class="pb-6 space-y-3">
                <h3 class="text-xs text-slate-400 font-bold uppercase tracking-widest border-l-2 border-cyan-500 pl-2">標的維度統計</h3>
                <div id="isinSummaryContainer" class="flex flex-col gap-4"></div>
            </div>
        </div>

        <div id="tab-holdings" class="hidden pb-6">
            <div class="max-w-md mx-auto mb-4">
                <button onclick="openHoldingModal()" class="w-full bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-200 font-bold py-3 rounded-xl shadow-md transition-colors flex justify-center items-center space-x-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    <span>開設資產子帳戶</span>
                </button>
            </div>
            <div id="holdingsContainer" class="flex flex-col gap-4 w-full"></div>
        </div>

        <div id="tab-master" class="hidden pb-6">
            <div class="mb-5 space-y-3 max-w-md mx-auto">
                <div class="text-[10px] text-slate-500 font-bold tracking-widest uppercase mb-1 border-l border-emerald-500 pl-1.5">⚙️ 邊緣網絡核心路由 (備用防禦設施)</div>
                <input type="text" id="workerUrlInput" onchange="saveWorkerUrl()" placeholder="https://fin-data-api.chortw.workers.dev" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-slate-400 font-mono text-[10px] focus:outline-none focus:border-emerald-500 transition-colors">
                
                <button id="updateBtn" onclick="updateEngine()" class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition-all transform active:scale-[0.99] flex items-center justify-center space-x-2">
                    <span id="btnIcon">🔄</span>
                    <span id="btnText">啟動形神千里 API</span>
                </button>
                <div class="text-center text-[10px] text-slate-500 font-mono" id="lastSyncTime">系統待命，尚未進行同步。</div>
            </div>

            <div class="max-w-md mx-auto mb-4 border-t border-slate-900 pt-4">
                <button onclick="openMasterModal()" class="w-full bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-200 font-bold py-3 rounded-xl shadow-md transition-colors flex justify-center items-center space-x-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    <span>新增市場標的</span>
                </button>
            </div>
            <div id="masterContainer" class="asset-container"></div>

            <div class="backup-section border-t border-slate-800 pt-6">
                <h3 class="text-xs text-slate-400 font-bold uppercase tracking-widest mb-3 border-l-2 border-cyan-500 pl-2">系統備份與還原 (JSON)</h3>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="backupJSON()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 py-3 rounded-xl shadow-md transition-colors flex justify-center items-center space-x-2 text-sm">
                        <span>📥 備份</span>
                    </button>
                    <button onclick="document.getElementById('restoreInput').click()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 py-3 rounded-xl shadow-md transition-colors flex justify-center items-center space-x-2 text-sm">
                        <span>📤 還原</span>
                    </button>
                    <input type="file" id="restoreInput" accept=".json" class="hidden" onchange="restoreJSON(event)">
                </div>
            </div>
        </div>

    </main>

    <div id="masterModal" class="hidden fixed inset-0 bg-slate-950/90 backdrop-blur-sm z-50 items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-sm p-5 shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar">
            <h3 id="mModalTitle" class="text-base font-bold text-slate-100 mb-4 border-b border-slate-800 pb-2">新增市場標的</h3>
            <div class="space-y-3">
                <div>
                    <label id="mIsinLabel" class="text-[10px] text-slate-400">ISIN / Ticker (鎖定不可改)</label>
                    <input type="text" id="mIsin" placeholder="ISIN 或 Ticker" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 font-mono text-sm uppercase mt-1">
                </div>
                <div>
                    <label class="text-[10px] text-slate-400">資產類別</label>
                    <select id="mType" onchange="toggleInterestInputs()" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 text-sm mt-1">
                        <option value="mutualfund">MutualFund (共同基金)</option>
                        <option value="stock">Stock (港美股 Ticker)</option>
                        <option value="bond">Bond (公債)</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] text-slate-400">自訂資產名稱</label>
                    <input type="text" id="mName" placeholder="自訂名稱" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 text-sm mt-1">
                </div>
                <div>
                    <label class="text-[10px] text-amber-400 font-bold">✨ Source URL (網址來源)</label>
                    <input type="text" id="mSourceUrl" placeholder="https://..." class="w-full bg-slate-950 border border-amber-600/50 rounded-lg px-3 py-2 text-slate-200 font-mono text-xs mt-1 focus:border-amber-400 focus:outline-none">
                </div>

                <div class="pt-2 border-t border-slate-800/50 grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] text-emerald-400 font-bold">派息頻率 (1-12)</label>
                        <input type="number" id="mIntFreq" min="1" max="12" placeholder="如: 12" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 font-mono text-sm mt-1 disabled:opacity-40 disabled:cursor-not-allowed disabled:bg-slate-900 transition-all">
                    </div>
                    <div>
                        <label class="text-[10px] text-emerald-400 font-bold">手動覆蓋派息額</label>
                        <input type="text" id="mIntVal" placeholder="如: 0.073 或 6.45%" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 font-mono text-sm mt-1 disabled:opacity-40 disabled:cursor-not-allowed disabled:bg-slate-900 transition-all">
                    </div>
                </div>
                <p class="text-[8px] text-slate-500 leading-tight">ℹ️ 基金/股票若留白派息資訊，將自動回退嘗試套用 Yahoo API 取回的派息數據。</p>
            </div>
            <div class="grid grid-cols-2 gap-3 mt-6">
                <button onclick="closeModals()" class="bg-slate-800 text-slate-300 py-2.5 rounded-lg text-sm">取消</button>
                <button onclick="saveMaster()" class="bg-emerald-600 text-white py-2.5 rounded-lg text-sm font-bold">儲存變更</button>
            </div>
        </div>
    </div>

    <div id="holdingModal" class="hidden fixed inset-0 bg-slate-950/90 backdrop-blur-sm z-50 items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-sm p-5 shadow-2xl">
            <h3 id="hModalTitle" class="text-base font-bold text-slate-100 mb-4 border-b border-slate-800 pb-2">開設資產子帳戶</h3>
            <input type="hidden" id="hId"> 
            <div class="space-y-3">
                <div>
                    <label class="text-[10px] text-slate-400">關聯標的 (代碼)</label>
                    <select id="hIsin" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 font-mono text-sm mt-1"></select>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] text-slate-400">Bucket (2碼)</label>
                        <input type="text" id="hBucket" maxlength="2" pattern="[A-Z]{2}" oninput="this.value = this.value.toUpperCase().replace(/[^A-Z]/g, '')" placeholder="WL" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 font-mono text-sm mt-1">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-400">結算貨幣</label>
                        <select id="hCurrency" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 font-mono text-sm mt-1">
                            <option value="USD">USD</option><option value="HKD">HKD</option><option value="GBP">GBP</option>
                            <option value="EUR">EUR</option><option value="JPY">JPY</option><option value="TWD">TWD</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] text-slate-400">平均買入價</label>
                        <input type="number" id="hAvgPrice" min="0" step="any" placeholder="0.00" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 font-mono text-sm mt-1">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-400">持有數量</label>
                        <input type="number" id="hQty" min="0" step="any" placeholder="0" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 font-mono text-sm mt-1">
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3 mt-6">
                <button onclick="closeModals()" class="bg-slate-800 text-slate-300 py-2.5 rounded-lg text-sm">取消</button>
                <button onclick="saveHolding()" class="bg-emerald-600 text-white py-2.5 rounded-lg text-sm font-bold">確認儲存</button>
            </div>
        </div>
    </div>

    <script>
        let dbMaster = JSON.parse(localStorage.getItem('v6_isin_master')) || [];
        let dbHoldings = JSON.parse(localStorage.getItem('v6_asset_holdings')) || [];
        
        let liveData = {}; 
        let fxRates = {};    
        let myCharts = {};   

        window.onload = function() {
            loadWorkerUrl();
            dbMaster = dbMaster.map(m => ({ 
                ...m, 
                sourceUrl: m.sourceUrl || '', 
                intFreq: m.intFreq || '', 
                intVal: m.intVal || '' 
            }));
            localStorage.setItem('v6_isin_master', JSON.stringify(dbMaster));

            if(dbMaster.length === 0) seedDefaultData(); 
            switchTab('overview');
            renderAll(); 
            if (dbMaster.length > 0) setTimeout(() => updateEngine(), 500);
        };

        async function updateEngine() {
            if(dbMaster.length === 0) return alert('請先設定資產主檔！');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            
            btnText.innerText = "api fetching...";
            btnIcon.innerText = "⚡";

            try {
                await Promise.all([ fetchPrices(), fetchFXRates() ]);
                renderAll(); 
                btnText.innerText = "✨ 結算與排序完成！";
                btnIcon.innerText = "✅";
            } catch (err) {
                btnText.innerText = "⚠️ 部分網路異常";
                btnIcon.innerText = "❌";
            }
            setTimeout(() => { btnText.innerText = "啟動形神千里 API"; btnIcon.innerText = "🔄"; }, 2000);
        }

        async function fetchPrices() {
            let workerUrl = document.getElementById('workerUrlInput').value.trim() || document.getElementById('workerUrlInput').placeholder;
            const cleanUrl = workerUrl.endsWith('/') ? workerUrl.slice(0, -1) : workerUrl;
            const sep = cleanUrl.includes('?') ? '&' : '?';

            const promises = dbMaster.map(async (m) => {
                try {
                    const encodedUrl = encodeURIComponent(m.sourceUrl || '');
                    const res = await fetch(`${cleanUrl}${sep}isin=${m.isin}&type=${m.type}&url=${encodedUrl}`);
                    
                    if (!res.ok) throw new Error();
                    const data = await res.json();
                    if (data.status === 'success') {
                        liveData[m.isin] = { 
                            price: data.price, 
                            divRate: data.dividendRate || 0,
                            exDiv: data.exDivDate || '無資料',
                            updateTime: data.updateTime || '---',
                            status: 'ok' 
                        };
                    } else { liveData[m.isin] = { price: 0, updateTime: '錯誤', status: 'error' }; }
                } catch { liveData[m.isin] = { price: 0, updateTime: '異常', status: 'error' }; }
            });
            await Promise.all(promises);
        }

        async function fetchFXRates() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/HKD');
                const data = await res.json();
                fxRates = data.rates; fxRates['HKD'] = 1;   
                document.getElementById('lastSyncTime').innerText = `HKD 基準同步於: ${new Date().toLocaleTimeString('zh-TW', {hour12:false})}`;
            } catch (e) {}
        }

        function renderAll() {
            renderMaster(); 
            renderHoldings(); 
            calculateAndRenderOverview(); 
        }

        function calculateAndRenderOverview() {
            let grandTotalMkt = 0; let grandTotalCost = 0; let grandTotalIncome = 0;
            
            let nestedBucketMap = {}; 
            let isinMap = {};   

            dbHoldings.forEach(h => {
                const mInfo = dbMaster.find(m => m.isin === h.isin) || { name: '未知', type: 'mutualfund' };
                const ld = liveData[h.isin] || { price: 0, divRate: 0, status: 'wait' };
                const rate = fxRates[h.currency] || 1; 
                const multiplier = (mInfo.type === 'bond') ? 0.01 : 1;
                
                const mktValueHKD = (ld.price * multiplier * h.qty) / rate;
                const costHKD = (h.avgPrice * multiplier * h.qty) / rate;
                const pnlHKD = mktValueHKD - costHKD;

                let incomeHKD = 0;

                if (mInfo.type === 'bond') {
                    if (ld.divRate > 0) {
                        incomeHKD = (100 * multiplier * h.qty * ld.divRate) / rate; 
                    }
                } else {
                    let valStr = mInfo.intVal || "";
                    let freq = parseInt(mInfo.intFreq) || 0;

                    if (valStr !== "" && freq > 0) {
                        if (valStr.includes('%')) {
                            let pct = parseFloat(valStr.replace('%', '')) / 100;
                            if (!isNaN(pct)) incomeHKD = (h.qty * ld.price * pct) / rate;
                        } else {
                            let amt = parseFloat(valStr);
                            if (!isNaN(amt)) incomeHKD = (h.qty * amt * freq) / rate;
                        }
                    } else if (valStr === "" && ld.divRate > 0) {
                        incomeHKD = (h.qty * ld.divRate) / rate;
                    }
                }

                grandTotalMkt += mktValueHKD; grandTotalCost += costHKD; grandTotalIncome += incomeHKD;

                if(!nestedBucketMap[h.bucket]) {
                    nestedBucketMap[h.bucket] = { mkt: 0, pnl: 0, income: 0, types: {} };
                }
                let b = nestedBucketMap[h.bucket];
                b.mkt += mktValueHKD; b.pnl += pnlHKD; b.income += incomeHKD;

                let t = mInfo.type || 'mutualfund';
                if(!b.types[t]) {
                    b.types[t] = { mkt: 0, pnl: 0, income: 0, items: [] };
                }
                b.types[t].mkt += mktValueHKD; b.types[t].pnl += pnlHKD; b.types[t].income += incomeHKD;
                
                b.types[t].items.push({ name: mInfo.name, isin: h.isin, mkt: mktValueHKD, pnl: pnlHKD, income: incomeHKD });

                if(!isinMap[h.isin]) isinMap[h.isin] = { mkt: 0, pnl: 0, income: 0, name: mInfo.name, type: mInfo.type };
                isinMap[h.isin].mkt += mktValueHKD; isinMap[h.isin].pnl += pnlHKD; isinMap[h.isin].income += incomeHKD;
            });

            document.getElementById('grandTotalValue').innerText = `$${formatNum(grandTotalMkt)}`;
            document.getElementById('grandTotalCost').innerText = `$${formatNum(grandTotalCost)}`;
            document.getElementById('grandTotalIncome').innerText = `+$${formatNum(grandTotalIncome)}`;
            
            const grandPnl = grandTotalMkt - grandTotalCost;
            const pnlEl = document.getElementById('grandTotalPnL');
            pnlEl.innerText = (grandPnl >= 0 ? '+' : '') + `$${formatNum(grandPnl)}`;

                'stock': { label: 'Stocks', color: 'text-amber-400' }

            Object.keys(nestedBucketMap).sort((a,b)=>nestedBucketMap[b].mkt - nestedBucketMap[a].mkt).forEach(bucketKey => {
                const bObj = nestedBucketMap[bucketKey];
                bLabels.push(bucketKey); bData.push(bObj.mkt);
                
                const bPnlColor = bObj.pnl >= 0 ? 'text-emerald-400' : 'text-rose-500';
                const bPnlSign = bObj.pnl >= 0 ? '+' : '';

                        </div>
                        <div class="text-right flex flex-col items-end space-y-0.5">
                            <p class="text-[11px] font-mono text-slate-200"><span class="text-[9px] text-slate-500 mr-1">市值</span>$${formatNum(bObj.mkt)}</p>
                            <p class="text-[11px] font-mono ${bPnlColor}"><span class="text-[9px] text-slate-500 mr-1">盈虧</span>${bPnlSign}$${formatNum(bObj.pnl)}</p>
                            <p class="text-[11px] font-mono text-emerald-300"><span class="text-[9px] text-slate-500 mr-1">年收</span>+$${formatNum(bObj.income)}</p>
                        </div>
                    </button>
                    <div id="nested-b-${bucketKey}" class="hidden flex-col bg-slate-950/50">
                `;

                Object.keys(bObj.types).sort((a,b) => bObj.types[b].mkt - bObj.types[a].mkt).forEach(typeKey => {
                    const tObj = bObj.types[typeKey];
                    const meta = typeLabels[typeKey] || { label: typeKey, color: 'text-slate-300' };
                    const tPnlColor = tObj.pnl >= 0 ? 'text-emerald-400' : 'text-rose-500';
                    const tPnlSign = tObj.pnl >= 0 ? '+' : '';

                    bucketHtml += `
                    <div class="border-t border-slate-800">
                        <button onclick="toggleGroup('nested-b-${bucketKey}-t-${typeKey}')" class="w-full flex justify-between items-center p-2.5 pl-6 hover:bg-slate-800/60 transition-colors border-l-2 border-slate-600">
                            <div class="text-left">
                                <span class="text-xs font-bold ${meta.color}">${meta.label}</span>
                                <p class="text-[9px] text-slate-500 mt-0.5">包含 ${tObj.items.length} 筆部位</p>
                            </div>
                            <div class="text-right flex flex-col items-end space-y-0.5">
                                <p class="text-[10px] font-mono text-slate-300"><span class="text-[8px] text-slate-500 mr-1">市值</span>$${formatNum(tObj.mkt)}</p>
                                <p class="text-[10px] font-mono ${tPnlColor}"><span class="text-[8px] text-slate-500 mr-1">盈虧</span>${tPnlSign}$${formatNum(tObj.pnl)}</p>
                                <p class="text-[10px] font-mono text-emerald-400"><span class="text-[8px] text-slate-500 mr-1">年收</span>+$${formatNum(tObj.income)}</p>
                            </div>
                        </button>
                        <div id="nested-b-${bucketKey}-t-${typeKey}" class="hidden flex-col gap-2 p-3 pl-8 bg-slate-950/80 border-t border-slate-800/30">
                    `;

                    // Layer 3: Item Cards
                    tObj.items.sort((a,b) => b.mkt - a.mkt).forEach(item => {
                        bucketHtml += createSummaryRow(item.name, item.mkt, item.pnl, item.income, item.isin, 'bg-slate-900 border border-slate-700/50');
                    });

                    bucketHtml += `</div></div>`; // End Layer 2 Content & Wrapper
                });

                bucketHtml += `</div></div>`; // End Layer 1 Content & Wrapper
                bCont.innerHTML += bucketHtml;
            });

            // ==========================================
            // 生成 標的維度統計 (維持原有的類別手風琴)
            // ==========================================
            const iCont = document.getElementById('isinSummaryContainer'); iCont.innerHTML = '';
            
            const groups = {
                'mutualfund': { label: 'Mutual Funds', items: [], mkt: 0, pnl: 0, income: 0, color: 'text-blue-400' },
                'bond': { label: 'Bonds', items: [], mkt: 0, pnl: 0, income: 0, color: 'text-emerald-400' },
                'stock': { label: 'Stocks', items: [], mkt: 0, pnl: 0, income: 0, color: 'text-amber-400' }
            };

            Object.keys(isinMap).forEach(i => {
                const data = isinMap[i];
                const t = data.type || 'mutualfund';
                if(groups[t]) {
                    groups[t].items.push({ isin: i, ...data });
                    groups[t].mkt += data.mkt;
                    groups[t].pnl += data.pnl;
                    groups[t].income += data.income;
                }
            });

            Object.keys(groups).forEach(key => {
                const g = groups[key];
                if (g.items.length === 0) return;
                
                g.items.sort((a,b) => b.mkt - a.mkt);
                
                const pColor = g.pnl >= 0 ? 'text-emerald-400' : 'text-rose-500';
                const pSign = g.pnl >= 0 ? '+' : '';

                let groupHtml = `
                <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden shadow-sm">
                    <button onclick="toggleGroup('group-${key}')" class="w-full flex justify-between items-center p-3 bg-slate-800/40 hover:bg-slate-800 transition-colors">
                        <div class="text-left">
                            <span class="text-sm font-bold ${g.color}">${g.label}</span>
                            <p class="text-[10px] text-slate-400 mt-0.5">共 ${g.items.length} 檔標的</p>
                        </div>
                        <div class="text-right flex flex-col items-end space-y-0.5">
                            <p class="text-[11px] font-mono text-slate-200"><span class="text-[9px] text-slate-500 mr-1">總市值</span>$${formatNum(g.mkt)}</p>
                            <p class="text-[11px] font-mono ${pColor}"><span class="text-[9px] text-slate-500 mr-1">總盈虧</span>${pSign}$${formatNum(g.pnl)}</p>
                            <p class="text-[11px] font-mono text-emerald-300"><span class="text-[9px] text-slate-500 mr-1">預估年收</span>+$${formatNum(g.income)}</p>
                        </div>
                    </button>
                    <div id="group-${key}" class="hidden p-3 pt-2 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 bg-slate-950/40 border-t border-slate-800/50">
                `;
                g.items.forEach(item => {
                    groupHtml += createSummaryRow(item.name, item.mkt, item.pnl, item.income, item.isin);
                });
                groupHtml += `</div></div>`;
                iCont.innerHTML += groupHtml;
            });

            const cLabels = [], cData = [], cColors = [];
            Object.keys(isinMap).sort((a,b)=>isinMap[b].pnl - isinMap[a].pnl).forEach(i => {
                cLabels.push(i.slice(-4)); cData.push(isinMap[i].pnl);
                cColors.push(isinMap[i].pnl >= 0 ? '#34d399' : '#fb7185'); 
            });

            updateCharts(bLabels, bData, cLabels, cData, cColors);
        }

        // 修改公用 Row 生成器以支援客製化背景色
        function createSummaryRow(title, mkt, pnl, income, subtitle='', customClass='bg-slate-900/60 border border-slate-800') {
            const pColor = pnl >= 0 ? 'text-emerald-400' : 'text-rose-500';
            const pSign = pnl >= 0 ? '+' : '';
            return `
            <div class="flex justify-between items-center p-2.5 rounded-lg h-full ${customClass}">
                <div class="truncate pr-2 flex-1">
                    <p class="text-sm font-bold text-slate-200 truncate">${title}</p>
                    ${subtitle ? `<p class="text-[9px] text-slate-500 font-mono mt-0.5">${subtitle}</p>` : ''}
                </div>
                <div class="text-right flex-shrink-0 flex flex-col justify-center space-y-0.5">
                    <p class="text-[11px] font-mono text-slate-300"><span class="text-[9px] text-slate-500 mr-1">市值</span>$${formatNum(mkt)}</p>
                    <p class="text-[11px] font-mono ${pColor}"><span class="text-[9px] text-slate-500 mr-1">盈虧</span>${pSign}$${formatNum(pnl)}</p>
                    <p class="text-[11px] font-mono text-emerald-300"><span class="text-[9px] text-slate-500 mr-1">年收</span>+$${formatNum(income)}</p>
                </div>
            </div>`;
        }

        // 手風琴群組切換
        function toggleGroup(id) {
            const el = document.getElementById(id);
            if(el.classList.contains('hidden')) {
                el.classList.remove('hidden');
                el.classList.add('flex'); 
            } else {
                el.classList.add('hidden');
                el.classList.remove('flex');
            }
        }

        function updateCharts(bLabels, bData, cLabels, cData, cColors) {
            Chart.defaults.color = '#94a3b8'; Chart.defaults.font.family = "monospace";
            if(myCharts['bucket']) myCharts['bucket'].destroy();
            myCharts['bucket'] = new Chart(document.getElementById('bucketChart').getContext('2d'), {
                type: 'doughnut', data: { labels: bLabels, datasets: [{ data: bData, backgroundColor: ['#10b981', '#3b82f6', '#f59e0b', '#8b5cf6', '#06b6d4'], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels:{boxWidth:10, font:{size:9}} } } }
            });
            if(myCharts['pnl']) myCharts['pnl'].destroy();
            myCharts['pnl'] = new Chart(document.getElementById('pnlChart').getContext('2d'), {
                type: 'bar', data: { labels: cLabels, datasets: [{ data: cData, backgroundColor: cColors, borderRadius: 2 }] },
                options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: true, ticks:{font:{size:9}} } } }
            });
        }

        function renderHoldings() {
            const cont = document.getElementById('holdingsContainer'); cont.innerHTML = '';
            if(dbHoldings.length === 0) return cont.innerHTML = '<p class="text-center text-xs text-slate-500 py-4">無資料，請先開設子帳戶</p>';
            
            let enrichedHoldings = dbHoldings.map(h => {
                const mInfo = dbMaster.find(m => m.isin === h.isin) || { name: '未知', type: 'mutualfund' };
                const ld = liveData[h.isin] || { price: 0, status: 'wait' };
                const rate = fxRates[h.currency] || 1;
                const multiplier = (mInfo.type === 'bond') ? 0.01 : 1;
                const mktHKD = (ld.price * multiplier * h.qty) / rate;
                return { ...h, mInfo, ld, mktHKD, costHKD: (h.avgPrice * multiplier * h.qty) / rate, pnlHKD: mktHKD - ((h.avgPrice * multiplier * h.qty) / rate), rate };
            });

            enrichedHoldings.sort((a, b) => b.mktHKD - a.mktHKD).forEach(h => {
                const displayPrice = h.ld.price ? h.ld.price.toFixed(4) : '---';
                const pnlColor = h.pnlHKD >= 0 ? 'text-emerald-400' : 'text-rose-500';
                
                let extraPanel = '';
                if (h.ld.status === 'ok') {
                    if (h.mInfo.type === 'bond') {
                        if (h.ld.divRate > 0) {
                            let incHKD = (1 * h.qty * h.ld.divRate) / h.rate;
                            let divTxt = `${(h.ld.divRate*100).toFixed(2)}%`;
                            extraPanel = `
                            <div class="grid grid-cols-3 gap-2 text-[9px] bg-emerald-950/40 p-2 rounded-b-lg border border-emerald-900/50 mt-auto">
                                <div class="text-left text-emerald-500">下次除息<br><span class="text-emerald-300 font-mono">${h.ld.exDiv}</span></div>
                                <div class="text-center border-x border-emerald-900/50 px-1 text-emerald-500">配息率<br><span class="text-emerald-300 font-mono">${divTxt}</span></div>
                                <div class="text-right text-emerald-500">預估年收 (HKD)<br><span class="text-emerald-400 font-mono font-bold">+$${formatNum(incHKD)}</span></div>
                            </div>`;
                        }
                    } else {
                        let valStr = h.mInfo.intVal || "";
                        let freq = parseInt(h.mInfo.intFreq) || 0;
                        let isAccumulating = false;
                        let cardCalcHKD = 0;
                        let displayTxt = valStr;
                        let freqTxt = h.mInfo.intFreq || '-';
                        
                        if (valStr !== "") {
                            if (freq === 0) {
                                isAccumulating = true;
                                if (valStr.includes('%')) {
                                    let pct = parseFloat(valStr.replace('%', '')) / 100;
                                    if (!isNaN(pct)) cardCalcHKD = (h.qty * h.ld.price * pct) / h.rate;
                                } else {
                                    let amt = parseFloat(valStr);
                                    if (!isNaN(amt)) cardCalcHKD = (h.qty * amt) / h.rate;
                                }
                            } else {
                                if (valStr.includes('%')) {
                                    let pct = parseFloat(valStr.replace('%', '')) / 100;
                                    if (!isNaN(pct)) cardCalcHKD = (h.qty * h.ld.price * pct) / h.rate;
                                    freqTxt = '依市值 %'; 
                                } else {
                                    let amt = parseFloat(valStr);
                                    if (!isNaN(amt) && freq > 0) cardCalcHKD = (h.qty * amt * freq) / h.rate;
                                }
                            }
                        } else if (valStr === "" && h.ld.divRate > 0) {
                            cardCalcHKD = (h.qty * h.ld.divRate) / h.rate;
                            displayTxt = h.ld.divRate.toFixed(4) + ' (API)';
                            freqTxt = 'API 自動抓取';
                            isAccumulating = false;
                        }
                        
                        if (cardCalcHKD > 0 || parseFloat(valStr) > 0 || (valStr === "" && h.ld.divRate > 0)) {
                            if (isAccumulating) {
                                extraPanel = `
                                <div class="grid grid-cols-3 gap-2 text-[9px] bg-blue-950/40 p-2 rounded-b-lg border border-blue-900/50 mt-auto">
                                    <div class="text-left text-blue-500">資產類別<br><span class="text-blue-300 font-mono">累積複利型</span></div>
                                    <div class="text-center border-x border-blue-900/50 px-1 text-blue-500">1年/YTD回報<br><span class="text-blue-300 font-mono">${displayTxt}</span></div>
                                    <div class="text-right text-blue-500">預估年增值 (HKD)<br><span class="text-blue-400 font-mono font-bold">+$${formatNum(cardCalcHKD)}</span></div>
                                </div>`;
                            } else {
                                extraPanel = `
                                <div class="grid grid-cols-3 gap-2 text-[9px] bg-emerald-950/40 p-2 rounded-b-lg border border-emerald-900/50 mt-auto">
                                    <div class="text-left text-emerald-500">配息/結算頻率<br><span class="text-emerald-300 font-mono">${freqTxt}</span></div>
                                    <div class="text-center border-x border-emerald-900/50 px-1 text-emerald-500">配息率/額<br><span class="text-emerald-300 font-mono">${displayTxt}</span></div>
                                    <div class="text-right text-emerald-500">預估年收 (HKD)<br><span class="text-emerald-400 font-mono font-bold">+$${formatNum(cardCalcHKD)}</span></div>
                                </div>`;
                            }
                        }
                    }
                }

                cont.innerHTML += `
                <div class="bg-slate-900 border border-slate-800 rounded-xl p-2.5 sm:p-3 shadow relative overflow-hidden flex flex-col h-full">
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex flex-col min-w-0 pr-1"><div class="flex items-center space-x-2"><span class="bg-amber-900/40 text-amber-500 font-bold px-1.5 py-0.5 rounded text-[10px] border border-amber-700/50 flex-shrink-0">${h.bucket}</span><span class="text-sm font-bold text-slate-200 truncate">${h.mInfo.name}</span></div><p class="text-[10px] text-slate-500 font-mono mt-0.5 ml-1 truncate">${h.isin}</p></div>
                        <div class="flex space-x-1 flex-shrink-0">
                            <button onclick="openHoldingModal('${h.id}')" class="p-1 sm:p-1.5 text-slate-400 hover:text-blue-400 bg-slate-800 rounded"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg></button>
                            <button onclick="delHolding('${h.id}')" class="p-1 sm:p-1.5 text-slate-500 hover:text-red-400 bg-slate-800 rounded"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
                        </div>
                    </div>
                    <div class="grid grid-cols-3 gap-2 text-[10px] bg-slate-950 p-2 rounded-t-lg border border-slate-800/50 border-b-0 mt-auto">
                        <div class="text-left"><p class="text-slate-500">均價 (${h.currency})</p><p class="font-mono text-slate-300">${h.avgPrice.toFixed(4)}</p></div>
                        <div class="text-center border-x border-slate-800/50 px-1"><p class="text-slate-500">現價 (${h.currency})</p><p class="font-mono font-bold text-slate-200">${displayPrice}</p></div>
                        <div class="text-right"><p class="text-slate-500">數量</p><p class="font-mono text-slate-300 font-bold">${h.qty}</p></div>
                    </div>
                    <div class="grid grid-cols-3 gap-2 text-[10px] bg-slate-800/40 p-2 border border-slate-800/50 ${extraPanel ? '' : 'rounded-b-lg'}">

                        <div class="text-center border-x border-slate-700/50 px-1"><p class="text-slate-500">市值 (HKD)</p><p class="font-mono text-slate-100">$${formatNum(h.mktHKD)}</p></div>
                        <div class="text-right"><p class="text-slate-500">浮盈/虧</p><p class="font-mono font-bold ${pnlColor}">${h.pnlHKD>=0?'+':''}$${formatNum(h.pnlHKD)}</p></div>
                    </div>
                    ${extraPanel}
                </div>`;
            });
        }

                        </div>
                    </div>
                    <div class="text-[10px] bg-slate-950 p-1.5 rounded font-mono text-slate-400 truncate border border-slate-800/60 flex items-center mt-auto">
                        <span class="text-amber-500 mr-1 flex-shrink-0">🔗 URL:</span>
                        ${urlHtml}
                    </div>
                </div>`;
            });
        }

        function toggleInterestInputs() {
            const type = document.getElementById('mType').value;
            const isBond = (type === 'bond');
            
            document.getElementById('mIntFreq').disabled = isBond;
            document.getElementById('mIntVal').disabled = isBond;
            if (isBond) {
                document.getElementById('mIntFreq').value = '';
                document.getElementById('mIntVal').value = '';
            }
            
            const label = document.getElementById('mIsinLabel');
            if (type === 'stock') {
                label.innerText = '股票代碼 (Ticker, 如 AAPL, 0700.HK)';
            } else {
                label.innerText = 'ISIN (12碼代碼，鎖定不可改)';
            }
        }

        function openMasterModal(isin = null) {
            const isinInput = document.getElementById('mIsin');
            const typeSelect = document.getElementById('mType');
            
            if (isin) {
                document.getElementById('mModalTitle').innerText = '✏️ 編輯市場標的';
                const m = dbMaster.find(x => x.isin === isin);
                isinInput.value = m.isin; isinInput.disabled = true;
                typeSelect.value = m.type; typeSelect.disabled = true; 
                document.getElementById('mName').value = m.name;
                document.getElementById('mSourceUrl').value = m.sourceUrl || '';
                document.getElementById('mIntFreq').value = m.intFreq || '';
                document.getElementById('mIntVal').value = m.intVal || '';
            } else {
                document.getElementById('mModalTitle').innerText = '➕ 新增市場標的';
                isinInput.value = ''; isinInput.disabled = false;
                typeSelect.value = 'mutualfund'; typeSelect.disabled = false;
                document.getElementById('mName').value = '';
                document.getElementById('mSourceUrl').value = '';
                document.getElementById('mIntFreq').value = '';
                document.getElementById('mIntVal').value = '';
            }
            toggleInterestInputs(); 
            document.getElementById('masterModal').classList.remove('hidden'); document.getElementById('masterModal').classList.add('flex');
        }

        function saveMaster() {
            const isinInput = document.getElementById('mIsin');
            const isin = isinInput.value.trim().toUpperCase();
            const type = document.getElementById('mType').value;
            const name = document.getElementById('mName').value.trim();
            const sourceUrl = document.getElementById('mSourceUrl').value.trim();
            const intFreq = document.getElementById('mIntFreq').value;
            const intVal = document.getElementById('mIntVal').value.trim();

            if(!isin || !name) return alert("請完整填寫代碼與資產名稱！");

            if ((type === 'mutualfund' || type === 'stock') && intVal !== '' && !intVal.includes('%')) {
                const freqNum = parseInt(intFreq);
                if (isNaN(freqNum) || freqNum < 1 || freqNum > 12) {
                    return alert("當手動覆蓋數值輸入定額數字（不含 %）時，必須輸入 1 到 12 之間的派息頻率！");
                }
            }

            if (isinInput.disabled) {
                const idx = dbMaster.findIndex(m => m.isin === isin);
                dbMaster[idx].name = name;
                dbMaster[idx].sourceUrl = sourceUrl;
                dbMaster[idx].intFreq = intFreq;
                dbMaster[idx].intVal = intVal;
            } else {
                if(dbMaster.find(m => m.isin === isin)) return alert("該代碼已存在於主檔中！");
                dbMaster.push({ isin, type, name, sourceUrl, intFreq, intVal });
            }

            localStorage.setItem('v6_isin_master', JSON.stringify(dbMaster));
            closeModals(); renderAll();
        }

        function delMaster(isin) {
            if(dbHoldings.find(h => h.isin === isin)) return alert("無法刪除！因為在「資產帳戶」中仍有部位團隊綁定此標的。請先清空該帳戶部位。");
            if(confirm('確定刪除此市場主檔？')) {
                dbMaster = dbMaster.filter(m => m.isin !== isin);
                localStorage.setItem('v6_isin_master', JSON.stringify(dbMaster));
                renderAll();
            }
        }

        function openHoldingModal(id = null) {
            const hIsinSel = document.getElementById('hIsin');
            hIsinSel.innerHTML = dbMaster.map(m => `<option value="${m.isin}">${m.isin} - ${m.name}</option>`).join('');
            if(dbMaster.length === 0) return alert("請先至 [資產報價] 頁籤新增標的");

            if (id) {
                document.getElementById('hModalTitle').innerText = '編輯資產子帳戶';
                const h = dbHoldings.find(x => x.id === id);
                document.getElementById('hId').value = h.id;
                hIsinSel.value = h.isin; hIsinSel.disabled = true;
                document.getElementById('hBucket').value = h.bucket; document.getElementById('hBucket').disabled = true;
                document.getElementById('hCurrency').value = h.currency;
                document.getElementById('hQty').value = h.qty;
                document.getElementById('hAvgPrice').value = h.avgPrice;
            } else {
                document.getElementById('hModalTitle').innerText = '開設資產子帳戶';
                document.getElementById('hId').value = '';
                hIsinSel.disabled = false; document.getElementById('hBucket').disabled = false;
                document.getElementById('hBucket').value = ''; document.getElementById('hQty').value = ''; document.getElementById('hAvgPrice').value = '';
            }
            document.getElementById('holdingModal').classList.remove('hidden'); document.getElementById('holdingModal').classList.add('flex');
        }

        function saveHolding() {
            const id = document.getElementById('hId').value;
            const isin = document.getElementById('hIsin').value;
            const bucket = document.getElementById('hBucket').value.trim().toUpperCase();
            const currency = document.getElementById('hCurrency').value;
            const qty = parseFloat(document.getElementById('hQty').value);
            const avg = parseFloat(document.getElementById('hAvgPrice').value);

            if(!/^[A-Z]{2}$/.test(bucket)) return alert("Bucket 必須為 2 位英文字母大寫！");
            if(isNaN(qty) || qty < 0) return alert("數量不可空白且必須 ≥ 0");
            if(isNaN(avg) || avg < 0) return alert("平均買入價不可空白且必須 ≥ 0");

            if (!id) {
                if(dbHoldings.find(h => h.bucket === bucket && h.isin === isin)) {
                    return alert(`該 Bucket [${bucket}] 中已存在相同的標的，請直接編輯該筆部位即可！`);
                }
                dbHoldings.push({ id: `pos_${Date.now()}`, isin, bucket, currency, qty, avgPrice: avg });
            } else {
                const idx = dbHoldings.findIndex(x => x.id === id);
                dbHoldings[idx].currency = currency; dbHoldings[idx].qty = qty; dbHoldings[idx].avgPrice = avg;
            }
            
            localStorage.setItem('v6_asset_holdings', JSON.stringify(dbHoldings));
            closeModals(); renderAll();
        }

        function delHolding(id) {
            if(confirm('確定要刪除此子帳戶？(歷史數據無法復原)')) {
                dbHoldings = dbHoldings.filter(h => h.id !== id);
                localStorage.setItem('v6_asset_holdings', JSON.stringify(dbHoldings));
                renderAll();
            }
        }

        function backupJSON() {
            const data = { schema_version: "1.1", export_date: new Date().toISOString(), master: dbMaster, holdings: dbHoldings };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            forceDownload(blob, `AssetTracker_V8.3_${new Date().toISOString().slice(0, 10)}.json`);
        }

        function restoreJSON(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data.master || !data.holdings) throw new Error("檔案缺少核心資料表");

                    dbMaster = data.master.map(m => ({ 
                        isin: m.isin || '', type: m.type || 'mutualfund', name: m.name || '未命名', 
                        sourceUrl: m.sourceUrl || '', intFreq: m.intFreq || '', intVal: m.intVal || '' 
                    }));
                    
                    dbHoldings = data.holdings.map(h => ({
                        id: h.id || `pos_${Math.random().toString(36).substr(2, 9)}`, isin: h.isin || '', bucket: h.bucket || 'XX', currency: h.currency || 'USD',
                        qty: Number(h.qty) || 0, avgPrice: Number(h.avgPrice) || 0
                    }));

                    localStorage.setItem('v6_isin_master', JSON.stringify(dbMaster));
                    localStorage.setItem('v6_asset_holdings', JSON.stringify(dbHoldings));
                    
                    document.getElementById('restoreInput').value = ''; 
                    renderAll();
                    alert(`✅ 系統洗車還原成功！`);
                } catch (err) { alert("❌ 還原失敗：JSON 格式損毀或不相容。"); }
            };
            reader.readAsText(file);
        }

        function exportPublicCSV() {
            let csv = "資產名稱,代碼,類別,最新報價,手動派息頻率,手動派息數值,資料來源網址,清算時間\n";
            dbMaster.forEach(m => {
                const lp = liveData[m.isin];
                csv += `"${m.name}","${m.isin}","${m.type}","${lp?.price || '---'}","${m.intFreq || '-'}","${m.intVal || '-'}","${m.sourceUrl}","${lp?.updateTime || '-'}"\n`;
            });
            triggerShareOrDownload(csv, 'AssetTracker_Public_Quotes', true);
        }

        function exportPrivateCSV() {
            if(!confirm("⚠️ 嚴重警告！\n此導出報表包含您真實的財富總值、持有數量與浮盈虧等高度私密資訊。\n\n為了安全，系統將自動封鎖社交分享面板，僅允許儲存於本機。確定要導出嗎？")) return;
            let csv = "Bucket,子帳戶 ID,關聯標的(代碼),資產名稱,結算幣別,持有數量,平均買入價,現價,帳戶市值(HKD),帳戶浮盈虧(HKD)\n";
            dbHoldings.forEach(h => {
                const mInfo = dbMaster.find(m => m.isin === h.isin) || { name: '未知', type: 'mutualfund' };
                const ld = liveData[h.isin] || { price: 0 };
                const rate = fxRates[h.currency] || 1;
                const multiplier = (mInfo.type === 'bond') ? 0.01 : 1;
                const mktHKD = (ld.price * multiplier * h.qty) / rate;
                const costHKD = (h.avgPrice * multiplier * h.qty) / rate;
                csv += `"${h.bucket}","${h.id}","${h.isin}","${mInfo.name}","${h.currency}",${h.qty},${h.avgPrice},${ld.price},${mktHKD.toFixed(2)},${(mktHKD-costHKD).toFixed(2)}\n`;
            });
            triggerShareOrDownload(csv, 'AssetTracker_PRIVATE_LEDGER', false);
        }

        function triggerShareOrDownload(csvContent, filenamePrefix, allowShare) {
            const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const fileName = `${filenamePrefix}_${new Date().toISOString().slice(0, 10)}.csv`;
            if (allowShare && navigator.canShare && navigator.canShare({ files: [new File([blob], fileName, {type: 'text/csv'})] })) {
                navigator.share({ files: [new File([blob], fileName, { type: 'text/csv' })], title: '報價分享' }).catch(() => forceDownload(blob, fileName));
            } else { forceDownload(blob, fileName); }
        }

        function forceDownload(blob, fileName) {
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = fileName;
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        function switchTab(tabId) {
            ['overview', 'holdings', 'master'].forEach(id => {
                document.getElementById(`tab-${id}`).classList.add('hidden');
                document.getElementById(`tab-btn-${id}`).classList.replace('bg-slate-800', 'bg-transparent');
                document.getElementById(`tab-btn-${id}`).classList.replace('text-emerald-400', 'text-slate-400');
            });
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            document.getElementById(`tab-btn-${tabId}`).classList.replace('bg-transparent', 'bg-slate-800');
            document.getElementById(`tab-btn-${tabId}`).classList.replace('text-slate-400', 'text-emerald-400');
        }

        function closeModals() {
            document.getElementById('masterModal').classList.add('hidden'); document.getElementById('masterModal').classList.remove('flex');
            document.getElementById('holdingModal').classList.add('hidden'); document.getElementById('holdingModal').classList.remove('flex');
        }

        function formatNum(num) { return num.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}); }
