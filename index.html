<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AssetTracker 行動資產看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body { font-family: 'Microsoft JhengHei', -apple-system, BlinkMacSystemFont, sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col pb-safe">

    <header class="bg-slate-900/80 backdrop-blur-md border-b border-slate-800 sticky top-0 z-40 px-4 py-3">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold bg-gradient-to-r from-amber-400 to-emerald-400 bg-clip-text text-transparent">AssetTracker V7.0</h1>
                <p class="text-[10px] text-slate-400 mt-0.5 tracking-widest uppercase">Wealth & Cashflow Engine</p>
            </div>
            <div class="flex space-x-2">
                <button onclick="exportPublicCSV()" class="p-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl transition-colors" title="分享公開報價">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>
                </button>
                <button onclick="exportPrivateCSV()" class="p-2 bg-red-900/80 hover:bg-red-800 text-red-200 rounded-xl transition-colors shadow-lg shadow-red-900/20" title="私密帳本本地導出">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                </button>
            </div>
        </div>
        
        <div class="max-w-xl mx-auto mt-3 flex bg-slate-950 rounded-xl p-1 border border-slate-800">
            <button onclick="switchTab('overview')" id="tab-btn-overview" class="flex-1 py-1.5 text-xs font-bold rounded-lg bg-slate-800 text-emerald-400 shadow transition-all">📊 總覽與圖表</button>
            <button onclick="switchTab('holdings')" id="tab-btn-holdings" class="flex-1 py-1.5 text-xs font-bold rounded-lg text-slate-400 hover:text-slate-200 transition-all">💼 資產帳戶</button>
            <button onclick="switchTab('master')" id="tab-btn-master" class="flex-1 py-1.5 text-xs font-bold rounded-lg text-slate-400 hover:text-slate-200 transition-all">⚙️ ISIN 報價</button>
        </div>
    </header>

    <main class="flex-1 max-w-5xl w-full mx-auto px-4 py-4 overflow-y-auto no-scrollbar">
        
        <div class="mb-5 p-4 bg-slate-900/40 border border-slate-800/60 rounded-2xl grid grid-cols-1 md:grid-cols-3 gap-3 items-center">
            <div class="md:col-span-2">
                <input type="text" id="workerUrlInput" onchange="saveWorkerUrl()" placeholder="https://fin-data-api.chortw.workers.dev?key=YOUR_KEY" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 text-slate-400 font-mono text-[10px] focus:outline-none focus:border-emerald-500 transition-colors">
            </div>
            <div class="flex flex-col space-y-1">
                <button id="updateBtn" onclick="updateEngine()" class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white font-bold py-2.5 px-4 rounded-xl shadow-lg transition-all transform active:scale-[0.99] flex items-center justify-center space-x-2 text-xs">
                    <span id="btnIcon">🔄</span>
                    <span id="btnText">全維度數據與現金流打撈</span>
                </button>
                <div class="text-center text-[10px] text-slate-500 font-mono" id="lastSyncTime">系統待命，尚未進行同步。</div>
            </div>
        </div>

        <div id="tab-overview" class="space-y-6">
            <div class="bg-gradient-to-br from-slate-900 to-slate-800 border border-slate-700 rounded-2xl p-5 shadow-xl relative overflow-hidden">
                <div class="absolute -right-4 -top-4 w-24 h-24 bg-emerald-500/10 rounded-full blur-2xl"></div>
                <h2 class="text-xs text-slate-400 font-bold uppercase tracking-widest mb-1">總資產市值 (HKD)</h2>
                <div class="text-3xl font-mono font-bold text-slate-100" id="grandTotalValue">$0.00</div>
                <div class="mt-3 flex justify-between items-end border-t border-slate-700/50 pt-3">
                    <div>
                        <p class="text-[10px] text-slate-400">總成本</p>
                        <p class="text-sm font-mono text-slate-300" id="grandTotalCost">$0.00</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-slate-400">總浮盈/虧</p>
                        <p class="text-base font-mono font-bold text-emerald-400" id="grandTotalPnL">+$0.00</p>
                    </div>
                </div>
                <div class="mt-3 bg-emerald-950/40 border border-emerald-800/50 rounded-lg p-2 flex justify-between items-center">
                    <span class="text-[10px] text-emerald-400 font-bold tracking-widest">💰 預估年配息被動收入 (HKD)</span>
                    <span class="text-sm font-mono font-bold text-emerald-300" id="grandTotalIncome">$0.00</span>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 shadow-lg flex flex-col items-center">
                    <h3 class="text-[10px] text-slate-400 font-bold uppercase mb-2 w-full text-center">Bucket 佔比</h3>
                    <div class="w-full relative aspect-square max-h-[220px]">
                        <canvas id="bucketChart"></canvas>
                    </div>
                </div>
                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 shadow-lg flex flex-col items-center">
                    <h3 class="text-[10px] text-slate-400 font-bold uppercase mb-2 w-full text-center">ISIN 浮盈虧排行</h3>
                    <div class="w-full relative min-h-[180px] max-h-[220px] flex-1">
                        <canvas id="pnlChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pb-6">
                <div>
                    <h3 class="text-xs text-slate-400 font-bold uppercase tracking-widest mb-3 border-l-2 border-amber-500 pl-2">Bucket 維度統計</h3>
                    <div id="bucketSummaryContainer" class="space-y-2"></div>
                </div>
                <div>
                    <h3 class="text-xs text-slate-400 font-bold uppercase tracking-widest mb-3 border-l-2 border-emerald-500 pl-2">ISIN 維度統計</h3>
                    <div id="isinSummaryContainer" class="space-y-2"></div>
                </div>
            </div>
        </div>

        <div id="tab-holdings" class="hidden space-y-4 pb-6">
            <div class="flex justify-center">
                <button onclick="openHoldingModal()" class="w-full md:w-auto md:px-8 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-200 font-bold py-3 rounded-xl shadow-md transition-colors flex justify-center items-center space-x-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    <span>開設資產子帳戶</span>
                </button>
            </div>
            <div id="holdingsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-4"></div>
        </div>

        <div id="tab-master" class="hidden space-y-4 pb-6">
            <div class="flex justify-center">
                <button onclick="openMasterModal()" class="w-full md:w-auto md:px-8 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-200 font-bold py-3 rounded-xl shadow-md transition-colors flex justify-center items-center space-x-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    <span>新增 ISIN 標的</span>
                </button>
            </div>
            <div id="masterContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4"></div>

            <div class="mt-8 border-t border-slate-800 pt-6 max-w-xl mx-auto w-full">
                <h3 class="text-xs text-slate-400 font-bold uppercase tracking-widest mb-3 border-l-2 border-cyan-500 pl-2 text-center md:text-left">系統備份與還原 (JSON)</h3>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="backupJSON()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 py-3 rounded-xl shadow-md transition-colors flex justify-center items-center space-x-2 text-sm">
                        <span>📥 備份</span>
                    </button>
                    <button onclick="document.getElementById('restoreInput').click()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 py-3 rounded-xl shadow-md transition-colors flex justify-center items-center space-x-2 text-sm">
                        <span>📤 還原</span>
                    </button>
                    <input type="file" id="restoreInput" accept=".json" class="hidden" onchange="restoreJSON(event)">
                </div>
            </div>
        </div>

    </main>

    <div id="masterModal" class="hidden fixed inset-0 bg-slate-950/90 backdrop-blur-sm z-50 items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-sm p-5 shadow-2xl">
            <h3 class="text-base font-bold text-slate-100 mb-4 border-b border-slate-800 pb-2">新增 ISIN 主檔</h3>
            <div class="space-y-3">
                <input type="text" id="mIsin" placeholder="ISIN (12碼大寫)" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 font-mono text-sm uppercase">
                <select id="mType" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 text-sm">
                    <option value="mutualfund">MutualFund (共同基金)</option>
                    <option value="bond">Bond (公債)</option>
                </select>
                <input type="text" id="mName" placeholder="自訂名稱" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 text-sm">
            </div>
            <div class="grid grid-cols-2 gap-3 mt-6">
                <button onclick="closeModals()" class="bg-slate-800 text-slate-300 py-2.5 rounded-lg text-sm">取消</button>
                <button onclick="saveMaster()" class="bg-emerald-600 text-white py-2.5 rounded-lg text-sm font-bold">儲存</button>
            </div>
        </div>
    </div>

    <div id="holdingModal" class="hidden fixed inset-0 bg-slate-950/90 backdrop-blur-sm z-50 items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-sm p-5 shadow-2xl">
            <h3 id="hModalTitle" class="text-base font-bold text-slate-100 mb-4 border-b border-slate-800 pb-2">開設資產子帳戶</h3>
            <input type="hidden" id="hId"> 
            <div class="space-y-3">
                <div>
                    <label class="text-[10px] text-slate-400">關聯標的 (ISIN)</label>
                    <select id="hIsin" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 font-mono text-sm mt-1"></select>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] text-slate-400">Bucket (2碼)</label>
                        <input type="text" id="hBucket" maxlength="2" pattern="[A-Z]{2}" oninput="this.value = this.value.toUpperCase().replace(/[^A-Z]/g, '')" placeholder="WL" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 font-mono text-sm mt-1">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-400">結算貨幣</label>
                        <select id="hCurrency" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 font-mono text-sm mt-1">
                            <option value="USD">USD</option><option value="HKD">HKD</option><option value="GBP">GBP</option>
                            <option value="EUR">EUR</option><option value="JPY">JPY</option><option value="TWD">TWD</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] text-slate-400">平均買入價</label>
                        <input type="number" id="hAvgPrice" min="0" step="any" placeholder="0.00" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 font-mono text-sm mt-1">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-400">持有數量</label>
                        <input type="number" id="hQty" min="0" step="any" placeholder="0" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 font-mono text-sm mt-1">
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3 mt-6">
                <button onclick="closeModals()" class="bg-slate-800 text-slate-300 py-2.5 rounded-lg text-sm">取消</button>
                <button onclick="saveHolding()" class="bg-emerald-600 text-white py-2.5 rounded-lg text-sm font-bold">確認儲存</button>
            </div>
        </div>
    </div>

    <script>
        let dbMaster = JSON.parse(localStorage.getItem('v6_isin_master')) || [];
        let dbHoldings = JSON.parse(localStorage.getItem('v6_asset_holdings')) || [];
        
        let liveData = {}; 
        let fxRates = {};    
        let myCharts = {};   

        window.onload = function() {
            loadWorkerUrl();
            if(dbMaster.length === 0) seedDefaultData(); 
            switchTab('overview');
            renderAll(); 
            if (dbMaster.length > 0) setTimeout(() => updateEngine(), 500);
        };

        async function updateEngine() {
            if(dbMaster.length === 0) return alert('請先設定 ISIN 主檔！');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            btnText.innerText = "打撈報價與派息中...";
            btnIcon.innerText = "⚡";

            try {
                await Promise.all([ fetchPrices(), fetchFXRates() ]);
                renderAll(); 
                btnText.innerText = "✨ 結算與排序完成！";
                btnIcon.innerText = "✅";
            } catch (err) {
                btnText.innerText = "⚠️ 部分網路異常";
                btnIcon.innerText = "❌";
            }
            setTimeout(() => { btnText.innerText = "全維度數據與現金流打撈"; btnIcon.innerText = "🔄"; }, 2000);
        }

        async function fetchPrices() {
            let workerUrl = document.getElementById('workerUrlInput').value.trim() || document.getElementById('workerUrlInput').placeholder;
            const cleanUrl = workerUrl.endsWith('/') ? workerUrl.slice(0, -1) : workerUrl;
            const sep = cleanUrl.includes('?') ? '&' : '?';

            const promises = dbMaster.map(async (m) => {
                try {
                    const res = await fetch(`${cleanUrl}${sep}isin=${m.isin}&type=${m.type}`);
                    if (!res.ok) throw new Error();
                    const data = await res.json();
                    if (data.status === 'success') {
                        liveData[m.isin] = { 
                            price: data.price, 
                            divRate: data.dividendRate || 0,
                            exDiv: data.exDivDate || '無資料',
                            ytd: data.ytdReturn || 0,
                            isAcc: data.isAccumulating,
                            status: 'ok' 
                        };
                    } else { liveData[m.isin] = { price: 0, status: 'error' }; }
                } catch { liveData[m.isin] = { price: 0, status: 'error' }; }
            });
            await Promise.all(promises);
        }

        async function fetchFXRates() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/HKD');
                const data = await res.json();
                fxRates = data.rates; fxRates['HKD'] = 1;   
                document.getElementById('lastSyncTime').innerText = `HKD 基準同步於: ${new Date().toLocaleTimeString('zh-TW', {hour12:false})}`;
            } catch (e) {}
        }

        function renderAll() {
            renderMaster(); 
            renderHoldings(); 
            calculateAndRenderOverview(); 
        }

        function calculateAndRenderOverview() {
            let grandTotalMkt = 0; let grandTotalCost = 0; let grandTotalIncome = 0;
            let bucketMap = {}; let isinMap = {};   

            dbHoldings.forEach(h => {
                const mInfo = dbMaster.find(m => m.isin === h.isin) || { name: '未知', type: 'fund' };
                const ld = liveData[h.isin] || { price: 0, divRate: 0, ytd: 0, isAcc: false };
                const rate = fxRates[h.currency] || 1; 
                const multiplier = (mInfo.type === 'bond') ? 0.01 : 1;
                
                const mktValueHKD = (ld.price * multiplier * h.qty) / rate;
                const costHKD = (h.avgPrice * multiplier * h.qty) / rate;
                const pnlHKD = mktValueHKD - costHKD;

                let incomeHKD = 0;
                if (!ld.isAcc && ld.divRate > 0) {
                    if (mInfo.type === 'bond') incomeHKD = (100 * multiplier * h.qty * ld.divRate) / rate; 
                    else incomeHKD = (ld.divRate * h.qty) / rate;
                }

                grandTotalMkt += mktValueHKD; grandTotalCost += costHKD; grandTotalIncome += incomeHKD;

                if(!bucketMap[h.bucket]) bucketMap[h.bucket] = { mkt: 0, pnl: 0 };
                bucketMap[h.bucket].mkt += mktValueHKD; bucketMap[h.bucket].pnl += pnlHKD;

                if(!isinMap[h.isin]) isinMap[h.isin] = { mkt: 0, pnl: 0, name: mInfo.name };
                isinMap[h.isin].mkt += mktValueHKD; isinMap[h.isin].pnl += pnlHKD;
            });

            document.getElementById('grandTotalValue').innerText = `$${formatNum(grandTotalMkt)}`;
            document.getElementById('grandTotalCost').innerText = `$${formatNum(grandTotalCost)}`;
            document.getElementById('grandTotalIncome').innerText = `+$${formatNum(grandTotalIncome)}`;
            
            const grandPnl = grandTotalMkt - grandTotalCost;
            const pnlEl = document.getElementById('grandTotalPnL');
            pnlEl.innerText = (grandPnl >= 0 ? '+' : '') + `$${formatNum(grandPnl)}`;
            pnlEl.className = `text-base font-mono font-bold ${grandPnl >= 0 ? 'text-emerald-400' : 'text-rose-500'}`;

            const bCont = document.getElementById('bucketSummaryContainer'); bCont.innerHTML = '';
            const bLabels = [], bData = [];
            Object.keys(bucketMap).sort((a,b)=>bucketMap[b].mkt - bucketMap[a].mkt).forEach(b => {
                bLabels.push(b); bData.push(bucketMap[b].mkt);
                bCont.innerHTML += createSummaryRow(`[${b}]`, bucketMap[b].mkt, bucketMap[b].pnl);
            });

            const iCont = document.getElementById('isinSummaryContainer'); iCont.innerHTML = '';
            Object.keys(isinMap).sort((a,b)=>isinMap[b].mkt - isinMap[a].mkt).forEach(i => {
                iCont.innerHTML += createSummaryRow(isinMap[i].name, isinMap[i].mkt, isinMap[i].pnl, i);
            });

            const cLabels = [], cData = [], cColors = [];
            Object.keys(isinMap).sort((a,b)=>isinMap[b].pnl - isinMap[a].pnl).forEach(i => {
                cLabels.push(i.slice(-4)); cData.push(isinMap[i].pnl);
                cColors.push(isinMap[i].pnl >= 0 ? '#34d399' : '#fb7185'); 
            });

            updateCharts(bLabels, bData, cLabels, cData, cColors);
        }

        function createSummaryRow(title, mkt, pnl, subtitle='') {
            const pColor = pnl >= 0 ? 'text-emerald-400' : 'text-rose-500';
            const pSign = pnl >= 0 ? '+' : '';
            return `
            <div class="flex justify-between items-center bg-slate-900/50 p-2 rounded-lg border border-slate-800">
                <div class="truncate pr-2">
                    <p class="text-sm font-bold text-slate-200 truncate">${title}</p>
                    ${subtitle ? `<p class="text-[9px] text-slate-500 font-mono">${subtitle}</p>` : ''}
                </div>
                <div class="text-right flex-shrink-0">
                    <p class="text-sm font-mono text-slate-100">$${formatNum(mkt)}</p>
                    <p class="text-[10px] font-mono ${pColor}">${pSign}$${formatNum(pnl)}</p>
                </div>
            </div>`;
        }

        function updateCharts(bLabels, bData, cLabels, cData, cColors) {
            Chart.defaults.color = '#94a3b8'; Chart.defaults.font.family = "monospace";
            if(myCharts['bucket']) myCharts['bucket'].destroy();
            myCharts['bucket'] = new Chart(document.getElementById('bucketChart').getContext('2d'), {
                type: 'doughnut', data: { labels: bLabels, datasets: [{ data: bData, backgroundColor: ['#10b981', '#3b82f6', '#f59e0b', '#8b5cf6', '#06b6d4'], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels:{boxWidth:10, font:{size:9}} } } }
            });
            if(myCharts['pnl']) myCharts['pnl'].destroy();
            myCharts['pnl'] = new Chart(document.getElementById('pnlChart').getContext('2d'), {
                type: 'bar', data: { labels: cLabels, datasets: [{ data: cData, backgroundColor: cColors, borderRadius: 2 }] },
                options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: true, ticks:{font:{size:9}} } } }
            });
        }

        function renderHoldings() {
            const cont = document.getElementById('holdingsContainer'); cont.innerHTML = '';
            
            let enrichedHoldings = dbHoldings.map(h => {
                const mInfo = dbMaster.find(m => m.isin === h.isin) || { name: '未知', type: 'fund' };
                const ld = liveData[h.isin] || { price: 0, status: 'wait' };
                const rate = fxRates[h.currency] || 1;
                const multiplier = (mInfo.type === 'bond') ? 0.01 : 1;
                const mktHKD = (ld.price * multiplier * h.qty) / rate;
                return { ...h, mInfo, ld, mktHKD, costHKD: (h.avgPrice * multiplier * h.qty) / rate, pnlHKD: mktHKD - ((h.avgPrice * multiplier * h.qty) / rate), rate };
            });

            enrichedHoldings.sort((a, b) => b.mktHKD - a.mktHKD).forEach(h => {
                const displayPrice = h.ld.price ? h.ld.price.toFixed(4) : '---';
                const pnlColor = h.pnlHKD >= 0 ? 'text-emerald-400' : 'text-rose-500';
                
                let extraPanel = '';
                if (h.ld.status === 'ok') {
                    if (!h.ld.isAcc && h.ld.divRate > 0) {
                        let incHKD = (h.mInfo.type === 'bond') ? (100 * (h.mInfo.type === 'bond' ? 0.01 : 1) * h.qty * h.ld.divRate) / h.rate : (h.ld.divRate * h.qty) / h.rate;
                        let divTxt = (h.mInfo.type === 'bond') ? `${(h.ld.divRate*100).toFixed(2)}%` : h.ld.divRate.toFixed(4);
                        extraPanel = `
                        <div class="grid grid-cols-3 gap-2 text-[9px] bg-emerald-950/40 p-2 rounded-b-lg border border-emerald-900/50 mt-1">
                            <div class="text-left text-emerald-500">下次除息<br><span class="text-emerald-300 font-mono">${h.ld.exDiv}</span></div>
                            <div class="text-center border-x border-emerald-900/50 px-1 text-emerald-500">配息率/額<br><span class="text-emerald-300 font-mono">${divTxt}</span></div>
                            <div class="text-right text-emerald-500">預估年收 (HKD)<br><span class="text-emerald-400 font-mono font-bold">+$${formatNum(incHKD)}</span></div>
                        </div>`;
                    } else if (h.ld.isAcc && h.ld.ytd) {
                        let ytdGrowth = h.mktHKD * h.ld.ytd;
                        extraPanel = `
                        <div class="grid grid-cols-3 gap-2 text-[9px] bg-blue-950/40 p-2 rounded-b-lg border border-blue-900/50 mt-1">
                            <div class="text-left text-blue-500">資產類別<br><span class="text-blue-300">累積複利型</span></div>
                            <div class="text-center border-x border-blue-900/50 px-1 text-blue-500">年初至今 (YTD)<br><span class="text-blue-300 font-mono">${(h.ld.ytd*100).toFixed(2)}%</span></div>
                            <div class="text-right text-blue-500">YTD 增長 (HKD)<br><span class="text-blue-400 font-mono font-bold">+$${formatNum(ytdGrowth)}</span></div>
                        </div>`;
                    }
                }

                cont.innerHTML += `
                <div class="bg-slate-900 border border-slate-800 rounded-xl p-3 shadow relative overflow-hidden flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex flex-col"><div class="flex items-center space-x-2"><span class="bg-amber-900/40 text-amber-500 font-bold px-1.5 py-0.5 rounded text-[10px] border border-amber-700/50">${h.bucket}</span><span class="text-sm font-bold text-slate-200">${h.mInfo.name}</span></div><p class="text-[10px] text-slate-500 font-mono mt-0.5 ml-1">${h.isin}</p></div>
                            <div class="flex space-x-1 flex-shrink-0">
                                <button onclick="openHoldingModal('${h.id}')" class="p-1.5 text-slate-400 hover:text-blue-400 bg-slate-800 rounded"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg></button>
                                <button onclick="delHolding('${h.id}')" class="p-1.5 text-slate-400 hover:text-red-400 bg-slate-800 rounded"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-2 text-[10px] bg-slate-950 p-2 rounded-t-lg border border-slate-800/50 border-b-0">
                            <div class="text-left"><p class="text-slate-500">均價 (${h.currency})</p><p class="font-mono text-slate-300">${h.avgPrice.toFixed(4)}</p></div>
                            <div class="text-center border-x border-slate-800/50 px-1"><p class="text-slate-500">現價 (${h.currency})</p><p class="font-mono font-bold text-slate-200">${displayPrice}</p></div>
                            <div class="text-right"><p class="text-slate-500">數量</p><p class="font-mono text-slate-300 font-bold">${h.qty}</p></div>
                        </div>
                        <div class="grid grid-cols-3 gap-2 text-[10px] bg-slate-800/40 p-2 rounded-b-lg border border-slate-800/50 ${extraPanel ? 'rounded-b-none border-b-0' : ''}">
                            <div class="text-left"><p class="text-slate-500">成本 (HKD)</p><p class="font-mono text-slate-400">$${formatNum(h.costHKD)}</p></div>
                            <div class="text-center border-x border-slate-700/50 px-1"><p class="text-slate-500">市值 (HKD)</p><p class="font-mono text-slate-100">$${formatNum(h.mktHKD)}</p></div>
                            <div class="text-right"><p class="text-slate-500">浮盈/虧</p><p class="font-mono font-bold ${pnlColor}">${h.pnlHKD>=0?'+':''}$${formatNum(h.pnlHKD)}</p></div>
                        </div>
                    </div>
                    ${extraPanel}
                </div>`;
            });
        }

        function openHoldingModal(id = null) {
            const hIsinSel = document.getElementById('hIsin');
            hIsinSel.innerHTML = dbMaster.map(m => `<option value="${m.isin}">${m.isin} - ${m.name}</option>`).join('');
            if(dbMaster.length === 0) return alert("請先至 [ISIN 報價] 頁籤新增標的");

            if (id) {
                document.getElementById('hModalTitle').innerText = '編輯資產子帳戶';
                const h = dbHoldings.find(x => x.id === id);
                document.getElementById('hId').value = h.id;
                hIsinSel.value = h.isin; hIsinSel.disabled = true;
                document.getElementById('hBucket').value = h.bucket; document.getElementById('hBucket').disabled = true;
                document.getElementById('hCurrency').value = h.currency;
                document.getElementById('hQty').value = h.qty;
                document.getElementById('hAvgPrice').value = h.avgPrice;
            } else {
                document.getElementById('hModalTitle').innerText = '開設資產子帳戶';
                document.getElementById('hId').value = '';
                hIsinSel.disabled = false; document.getElementById('hBucket').disabled = false;
                document.getElementById('hBucket').value = ''; document.getElementById('hQty').value = ''; document.getElementById('hAvgPrice').value = '';
            }
            document.getElementById('holdingModal').classList.remove('hidden'); document.getElementById('holdingModal').classList.add('flex');
        }

        function saveHolding() {
            const id = document.getElementById('hId').value;
            const isin = document.getElementById('hIsin').value;
            const bucket = document.getElementById('hBucket').value.trim().toUpperCase();
            const currency = document.getElementById('hCurrency').value;
            const qty = parseFloat(document.getElementById('hQty').value);
            const avg = parseFloat(document.getElementById('hAvgPrice').value);

            if(!/^[A-Z]{2}$/.test(bucket)) return alert("Bucket 必須為 2 位英文字母大寫！");
            if(isNaN(qty) || qty < 0) return alert("數量不可空白且必須 ≥ 0");
            if(isNaN(avg) || avg < 0) return alert("平均買入價不可空白且必須 ≥ 0");

            if (!id) {
                if(dbHoldings.find(h => h.bucket === bucket && h.isin === isin)) {
                    return alert(`該 Bucket [${bucket}] 中已存在相同的 ISIN，請直接編輯該筆部位即可！`);
                }
                dbHoldings.push({ id: `pos_${Date.now()}`, isin, bucket, currency, qty, avgPrice: avg });
            } else {
                const idx = dbHoldings.findIndex(x => x.id === id);
                dbHoldings[idx].currency = currency; dbHoldings[idx].qty = qty; dbHoldings[idx].avgPrice = avg;
            }
            
            localStorage.setItem('v6_asset_holdings', JSON.stringify(dbHoldings));
            closeModals(); renderAll();
        }

        function delHolding(id) {
            if(confirm('確定要刪除此子帳戶？(歷史數據無法復原)')) {
                dbHoldings = dbHoldings.filter(h => h.id !== id);
                localStorage.setItem('v6_asset_holdings', JSON.stringify(dbHoldings));
                renderAll();
            }
        }

        function renderMaster() {
            const cont = document.getElementById('masterContainer');
            cont.innerHTML = '';
            dbMaster.forEach((m) => {
                const lp = liveData[m.isin];
                const priceHtml = lp?.price 
                    ? `<span class="text-emerald-400 font-mono font-bold text-sm">${lp.price.toFixed(4)}</span>` 
                    : `<span class="text-slate-600 text-xs font-mono">---</span>`;

                cont.innerHTML += `
                <div class="flex justify-between items-center bg-slate-900 border border-slate-800 rounded-lg p-3 shadow">
                    <div class="overflow-hidden flex-1">
                        <p class="text-sm font-bold text-slate-200 truncate">${m.name}</p>
                        <p class="text-[10px] text-slate-500 font-mono">${m.isin} | ${m.type.toUpperCase()}</p>
                    </div>
                    <div class="flex items-center space-x-4">
                        <div class="text-right leading-tight">
                            <p class="text-[9px] text-slate-500">最新報價</p>
                            ${priceHtml}
                        </div>
                        <button onclick="delMaster('${m.isin}')" class="p-2 hover:bg-red-900/50 text-slate-500 hover:text-red-400 rounded-lg transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        </button>
                    </div>
                </div>`;
            });
        }

        function openMasterModal() {
            document.getElementById('masterModal').classList.remove('hidden'); document.getElementById('masterModal').classList.add('flex');
            document.getElementById('mIsin').value = ''; document.getElementById('mName').value = '';
        }

        function saveMaster() {
            const isin = document.getElementById('mIsin').value.trim().toUpperCase();
            const type = document.getElementById('mType').value;
            const name = document.getElementById('mName').value.trim();
            if(!isin || !name) return alert("請完整填寫 ISIN 與名稱！");
            if(dbMaster.find(m => m.isin === isin)) return alert("該 ISIN 已存在於主檔中！");

            dbMaster.push({ isin, type, name });
            localStorage.setItem('v6_isin_master', JSON.stringify(dbMaster));
            closeModals(); renderAll();
        }

        function delMaster(isin) {
            if(dbHoldings.find(h => h.isin === isin)) return alert("無法刪除！因為在「資產帳戶」中仍有部位綁定此標的。請先清空部位。");
            if(confirm('確定刪除此 ISIN 主檔？')) {
                dbMaster = dbMaster.filter(m => m.isin !== isin);
                localStorage.setItem('v6_isin_master', JSON.stringify(dbMaster));
                renderAll();
            }
        }

        function backupJSON() {
            const data = { schema_version: "1.0", export_date: new Date().toISOString(), master: dbMaster, holdings: dbHoldings };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            forceDownload(blob, `AssetTracker_DB_Backup_${new Date().toISOString().slice(0, 10)}.json`);
        }

        function restoreJSON(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data.master || !data.holdings) throw new Error("檔案缺少核心資料表");

                    dbMaster = data.master.map(m => ({ isin: m.isin || '', type: m.type || 'mutualfund', name: m.name || '未命名' }));
                    dbHoldings = data.holdings.map(h => ({
                        id: h.id || `pos_${Math.random().toString(36).substr(2, 9)}`, isin: h.isin || '', bucket: h.bucket || 'XX', currency: h.currency || 'USD',
                        qty: Number(h.qty) || 0, avgPrice: Number(h.avgPrice) || 0
                    }));

                    localStorage.setItem('v6_isin_master', JSON.stringify(dbMaster));
                    localStorage.setItem('v6_asset_holdings', JSON.stringify(dbHoldings));
                    
                    document.getElementById('restoreInput').value = ''; 
                    renderAll();
                    alert(`✅ 系統還原成功！\n共載入 ${dbMaster.length} 筆主檔與 ${dbHoldings.length} 筆子帳戶。`);
                } catch (err) { alert("❌ 還原失敗：JSON 格式損毀或不相容。"); console.error(err); }
            };
            reader.readAsText(file);
        }

        function exportPublicCSV() {
            let csv = "資產名稱,ISIN,類別,最新報價\n";
            dbMaster.forEach(m => {
                const lp = liveData[m.isin];
                csv += `"${m.name}","${m.isin}","${m.type}","${lp?.price || '---'}"\n`;
            });
            triggerShareOrDownload(csv, 'AssetTracker_Public_Quotes', true);
        }

        function exportPrivateCSV() {
            if(!confirm("⚠️ 嚴重警告！\n此導出報表包含您真實的財富總值、持有數量與浮盈虧等高度私密資訊。\n\n為了安全，系統將自動封鎖社交分享面板，僅允許儲存於本機。確定要導出嗎？")) return;
            
            let csv = "Bucket,子帳戶 ID,關聯標的(ISIN),資產名稱,結算幣別,持有數量,平均買入價(外幣),現價(外幣),帳戶市值(HKD),帳戶浮盈虧(HKD)\n";
            dbHoldings.forEach(h => {
                const mInfo = dbMaster.find(m => m.isin === h.isin) || { name: '未知', type: 'fund' };
                const ld = liveData[h.isin] || { price: 0 };
                const rate = fxRates[h.currency] || 1;
                const multiplier = (mInfo.type === 'bond') ? 0.01 : 1;
                
                const mktHKD = (ld.price * multiplier * h.qty) / rate;
                const costHKD = (h.avgPrice * multiplier * h.qty) / rate;
                const pnlHKD = mktHKD - costHKD;
                
                csv += `"${h.bucket}","${h.id}","${h.isin}","${mInfo.name}","${h.currency}",${h.qty},${h.avgPrice},${ld.price},${mktHKD.toFixed(2)},${pnlHKD.toFixed(2)}\n`;
            });
            triggerShareOrDownload(csv, 'AssetTracker_PRIVATE_LEDGER', false);
        }

        function triggerShareOrDownload(csvContent, filenamePrefix, allowShare) {
            const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const fileName = `${filenamePrefix}_${new Date().toISOString().slice(0, 10)}.csv`;
            
            if (allowShare && navigator.canShare && navigator.canShare({ files: [new File([blob], fileName, {type: 'text/csv'})] })) {
                navigator.share({ files: [new File([blob], fileName, { type: 'text/csv' })], title: '報價分享' })
                .catch(() => forceDownload(blob, fileName));
            } else { forceDownload(blob, fileName); }
        }

        function forceDownload(blob, fileName) {
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        function switchTab(tabId) {
            ['overview', 'holdings', 'master'].forEach(id => {
                document.getElementById(`tab-${id}`).classList.add('hidden');
                document.getElementById(`tab-btn-${id}`).classList.replace('bg-slate-800', 'bg-transparent');
                document.getElementById(`tab-btn-${id}`).classList.replace('text-emerald-400', 'text-slate-400');
            });
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            document.getElementById(`tab-btn-${tabId}`).classList.replace('bg-transparent', 'bg-slate-800');
            document.getElementById(`tab-btn-${tabId}`).classList.replace('text-slate-400', 'text-emerald-400');
        }

        function closeModals() {
            document.getElementById('masterModal').classList.add('hidden'); document.getElementById('masterModal').classList.remove('flex');
            document.getElementById('holdingModal').classList.add('hidden'); document.getElementById('holdingModal').classList.remove('flex');
        }

        function formatNum(num) { 
            return num.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}); 
        }

        function saveWorkerUrl() { 
            localStorage.setItem('v6_worker_url', document.getElementById('workerUrlInput').value.trim()); 
        }

        function loadWorkerUrl() { 
            document.getElementById('workerUrlInput').value = localStorage.getItem('v6_worker_url') || ''; 
        }

        function seedDefaultData() {
            dbMaster = [
                { isin: 'US912810UB25', type: 'bond', name: '美元國債 2044' },
                { isin: 'IE00B92ZW543', type: 'mutualfund', name: 'PIMCO收益基金' }
            ];
            dbHoldings = [
                { id: 'pos_1', isin: 'US912810UB25', bucket: 'WL', currency: 'USD', qty: 10000, avgPrice: 95.5 },
                { id: 'pos_2', isin: 'IE00B92ZW543', bucket: 'HB', currency: 'HKD', qty: 5000, avgPrice: 10.2 }
            ];
            localStorage.setItem('v6_isin_master', JSON.stringify(dbMaster));
            localStorage.setItem('v6_asset_holdings', JSON.stringify(dbHoldings));
        }
    </script>
</body>
</html>
